spring.application.name=api-gateway
server.port=9000

# Actuator
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers

# Resilience4j Properties
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=8
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=20
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=4
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true

# Keycloak 
keycloak.auth.jwt-set-uri=http://localhost:8091/realms/et-security-realm/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8091/realms/et-security-realm

# Security
security.excluded.urls=/actuator/**, /swagger-ui.html, /swagger-ui/**, /docs/**, /v3/api-docs/**, /swagger-resources/**, /api-docs/**

# OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.urls[0].name=User Service
springdoc.swagger-ui.urls[0].url=/docs/user-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Device Service
springdoc.swagger-ui.urls[1].url=/docs/device-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Ingestion Service
springdoc.swagger-ui.urls[2].url=/docs/ingestion-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=Insight Service
springdoc.swagger-ui.urls[3].url=/docs/insight-service/v3/api-docs
